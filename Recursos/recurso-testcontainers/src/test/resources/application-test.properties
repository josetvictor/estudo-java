# =====================================================================
# Configurações para o perfil "test" (sobrescreve application.properties)
# O Testcontainers injeta dinamicamente as propriedades de datasource
# via @DynamicPropertySource na classe BaseIntegrationTest, portanto
# as propriedades de URL, username e password não são necessárias aqui.
# =====================================================================

# JPA / Hibernate - usa create-drop para garantir schema limpo a cada execução
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Driver e Dialeto do PostgreSQL para uso com Testcontainers
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Desabilita o console H2 no perfil de teste (não é necessário)
spring.h2.console.enabled=false
